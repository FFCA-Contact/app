name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Se déclenche dès que vous validez du code sur main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Generate Version Number
        id: versioning
        run: |
          # Génère une version basée sur le numéro d'exécution (ex: 1.0.42)
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Inject Version in HTML
        run: |
          # Remplace les placeholders par la vraie version
          sed -i "s/{{VERSION}}/${{ env.VERSION }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Déploie tout le contenu du dossier racine
          branch: gh-pages # Branche de destination pour l'hébergement
