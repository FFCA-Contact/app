name: Increment Version

on:
  push:
    branches:
      - main  # S'exécute à chaque push sur la branche main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Version Number
        id: versioning
        run: |
          # On compte le nombre de commits pour créer un numéro de version simple
          # Ou tu peux utiliser la date : $(date +'%Y.%m.%d.%H%M')
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Generated Version: $VERSION"

      - name: Update version in HTML
        run: |
          # Remplace {{VERSION}} par le numéro généré dans l'index.html
          sed -i "s/{{VERSION}}/${{ env.VERSION }}/g" index.html
          # Met aussi à jour les query strings des assets pour éviter le cache
          sed -i "s/v=1.0.0/v=${{ env.VERSION }}/g" index.html

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump version to ${{ env.VERSION }}"
          git push
