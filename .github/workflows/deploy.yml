name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Se déclenche dès que vous validez du code sur main 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Generate and Inject Version
        run: |
          # 1. Génération de la version
          VERSION="1.0.${{ github.run_number }}"
          echo "Version générée : $VERSION"
          
          # 2. Injection directe dans index.html
          # On utilise des doubles quotes pour que le shell interprète la variable $VERSION
          sed -i "s/{{VERSION}}/${VERSION}/g" index.html
          
          # Vérification (optionnel, visible dans les logs)
          grep "version" index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages
